name: Gentoo Overlay QA

on:
  pull_request:
  push:
    branches: [master]

jobs:
  pkgcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Track previous run status
        id: prev
        run: |
          LAST=$(gh run list -R $GITHUB_REPOSITORY \
            --workflow=ci.yml --status=completed \
            --json=event,conclusion \
            --jq='first(.[] | select(.event != "pull_request")).conclusion' 2>/dev/null || echo "unknown")
          echo "status=${LAST}" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout overlay
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run pkgcheck
        uses: pkgcore/pkgcheck-action@v1
        with:
          # --exit overrides the hardcoded GentooCI checkset from pkgcheck-action.
          # Fail on real errors only — exclude expected overlay warnings:
          #   NonsolvableDeps*  — ~arch deps unsolvable in stable/dev/exp profiles
          #   VisibleVcsPkg     — live 9999 ebuilds visible (intentional)
          #   UnknownMirror     — overlay-only mirrors (sourceforge)
          #   RedundantVersion  — multiple versions are intentional
          #   UnknownLicense    — overlay-specific licenses (AGPL-3.0, BSL-1.1)
          #   UnknownUseFlags   — overlay-local USE flags (clang, flatpak)
          #   UnknownKeywords   — ** keyword for live builds
          args: --exit error,-NonsolvableDepsInStable,-NonsolvableDepsInDev,-NonsolvableDepsInExp,-VisibleVcsPkg,-UnknownMirror,-RedundantVersion,-UnknownLicense,-UnknownUseFlags,-UnknownKeywords
