name: Gentoo Overlay QA

on:
  pull_request:
  push:
    branches: [master]

jobs:
  pkgcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Track previous run status
        id: prev
        run: |
          LAST=$(gh run list -R $GITHUB_REPOSITORY \
            --workflow=ci.yml --status=completed \
            --json=event,conclusion \
            --jq='first(.[] | select(.event != "pull_request")).conclusion' 2>/dev/null || echo "unknown")
          echo "status=${LAST}" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout overlay
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run pkgcheck
        uses: pkgcore/pkgcheck-action@v1
        with:
          # --exit overrides the hardcoded GentooCI checkset from pkgcheck-action
          # Fail on errors EXCEPT expected overlay warnings:
          #   NonsolvableDepsInStable — ~arch deps not in stable profiles (expected)
          #   NonsolvableDepsInDev    — same for ~arch/dev profiles
          #   VisibleVcsPkg           — live 9999 ebuilds visible (expected)
          #   UnknownMirror           — overlay-only mirrors (linssid/sourceforge)
          #   RedundantVersion        — multiple versions are intentional
          args: --exit error,-NonsolvableDepsInStable,-NonsolvableDepsInDev,-VisibleVcsPkg,-UnknownMirror,-RedundantVersion
